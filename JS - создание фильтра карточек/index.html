<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter</title>
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <div class="filter">
        <div class="filter-btns">
            <div data-filter="all" class="filter-btns__item active">Все</div>
            <div data-filter="animals" class="filter-btns__item">Животные</div>
            <div data-filter="people" class="filter-btns__item">Люди</div>
            <div data-filter="nature" class="filter-btns__item">Природа</div>

            <select id="filter-options">
                <option value="all">Все</option>
                <option value="animals">Животные</option>
                <option value="people">Люди</option>
                <option value="nature">Природа</option>
            </select>
        </div>
        <div class="filter-content">
            <img class="all animals" src="/JS - создание фильтра карточек/img/i.webp" alt="">
            <img class="all nature" src="https://avatars.mds.yandex.net/i?id=adeda2144347d2a287586b8d0d4621028d0c866e-5151070-images-thumbs&n=13" alt="">
            <img class="all animals" src="/JS - создание фильтра карточек/img/i (1).webp" alt="">
            <img class="all animals" src="/JS - создание фильтра карточек/img/i (2).webp" alt="">
            <img class="all people" src="https://avatars.mds.yandex.net/i?id=ce0960ad0e088f431dc232ea2ddcc4ac3ff9f4ac-4883843-images-thumbs&n=13" alt="">
            <img class="all animals" src="https://avatars.mds.yandex.net/i?id=f3401af59f708da8e836bbd65c7c023831e65e79-3925790-images-thumbs&n=13" alt="">
            <img class="all nature" src="https://avatars.mds.yandex.net/i?id=8e75a8a7569dc1d2cc83f1521b5a64def3e34fc0-4983949-images-thumbs&n=13" alt="">
            <img class="all people" src="https://avatars.mds.yandex.net/i?id=002c82f690f3a41efb474d435be8cdbdbb24bdb2-5509203-images-thumbs&n=13" alt="">
            <img class="all people" src="https://avatars.mds.yandex.net/i?id=81fc12ce8a94ec3c7136c90b61db22a2ed4edcfb-5207916-images-thumbs&n=13" alt="">
            <img class="all animals" src="https://avatars.mds.yandex.net/i?id=a5f4c54f3d076484fffe705cbb7621f5c22596df-4615428-images-thumbs&n=13" alt="">
            <img class="all people" src="https://avatars.mds.yandex.net/i?id=32e04eeac2cad7744861df426abde64f8fbd3d04-8310741-images-thumbs&n=13" alt="">
            <img class="all nature" src="https://avatars.mds.yandex.net/i?id=ab858ecb500a362639fd153e1bb4fa91848559bb-5889206-images-thumbs&n=13" alt="">
        </div>
    </div>
    
    <script src="/JS - создание фильтра карточек/main.js"></script>
</body>
</html>
